name: Release — XCFramework + AAR + WASM/npm

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Generate bindings on Linux (fast) ──────────────────────────────
  bindings:
    name: Generate bindings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Checkout r2ps-client (sibling path dependency)
        run: git clone --depth 1 https://github.com/sirosfoundation/r2ps-client.git "$(dirname "$GITHUB_WORKSPACE")/r2ps-client"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: make bindings
      - uses: actions/upload-artifact@v4
        with:
          name: bindings
          path: bindings/

  # ── iOS / XCFramework (requires macOS) ─────────────────────────────
  ios:
    name: Build XCFramework
    runs-on: macos-latest
    needs: bindings
    env:
      IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    steps:
      - uses: actions/checkout@v7
      - name: Checkout r2ps-client (sibling path dependency)
        run: git clone --depth 1 https://github.com/sirosfoundation/r2ps-client.git "$(dirname "$GITHUB_WORKSPACE")/r2ps-client"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios
      - uses: Swatinem/rust-cache@v2
      - uses: actions/download-artifact@v8
        with:
          name: bindings
          path: bindings/
      - run: make xcframework
      - name: Package XCFramework
        run: |
          cd target
          zip -r siros_wscd_manager.xcframework.zip siros_wscd_manager.xcframework
      - uses: actions/upload-artifact@v4
        with:
          name: xcframework
          path: target/siros_wscd_manager.xcframework.zip

  # ── Android / AAR (requires NDK) ──────────────────────────────────
  android:
    name: Build AAR
    runs-on: ubuntu-latest
    needs: bindings
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - name: Checkout r2ps-client (sibling path dependency)
        run: git clone --depth 1 https://github.com/sirosfoundation/r2ps-client.git "$(dirname "$GITHUB_WORKSPACE")/r2ps-client"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-ndk
        run: cargo install cargo-ndk
      - uses: android-actions/setup-android@v4
        with:
          api-level: 28
          ndk-version: "27.2.12479018"
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: actions/download-artifact@v8
        with:
          name: bindings
          path: bindings/
      - name: Derive package version from tag
        run: echo "PKG_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
      - name: Build AAR
        run: make aar VERSION="$PKG_VERSION"
      - name: Generate Maven POM
        run: make pom VERSION="$PKG_VERSION"
      - name: Publish AAR to GitHub Packages
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > /tmp/settings.xml <<'EOF'
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>${env.GITHUB_ACTOR}</username>
                <password>${env.GITHUB_TOKEN}</password>
              </server>
            </servers>
          </settings>
          EOF
          AAR=$(ls target/siros_wscd_manager-*.aar)
          POM=$(ls target/siros-wscd-manager-*.pom)
          mvn -B deploy:deploy-file \
            --settings /tmp/settings.xml \
            -DrepositoryId=github \
            -Durl="https://maven.pkg.github.com/${GITHUB_REPOSITORY}" \
            -DpomFile="$POM" \
            -Dfile="$AAR" \
            -Dpackaging=aar
      - uses: actions/upload-artifact@v4
        with:
          name: aar
          path: |
            target/siros_wscd_manager-*.aar
            target/siros-wscd-manager-*.pom


  # ── WASM / npm package ───────────────────────────────────────────────
  wasm:
    name: Build & Publish WASM (npm)
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - name: Install wasm-pack
        run: cargo install wasm-pack
      - name: Build WASM package
        run: wasm-pack build --target web --no-default-features --features wasm
      - name: Set package version and metadata from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd pkg
          jq --arg v "$VERSION" '.version = $v | .name = "@sirosfoundation/wscd-manager-wasm" | .publishConfig = {"access": "public"}' package.json > tmp.json && mv tmp.json package.json
      - name: Publish to npm
        run: |
          cd pkg
          npm publish --access public
      - uses: actions/upload-artifact@v4
        with:
          name: wasm-pkg
          path: pkg/

  # ── Create GitHub Release ──────────────────────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [ios, android, wasm, bindings]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          name: xcframework
          path: artifacts/
      - uses: actions/download-artifact@v8
        with:
          name: aar
          path: artifacts/
      - uses: actions/download-artifact@v8
        with:
          name: wasm-pkg
          path: artifacts/wasm-pkg/
      - uses: actions/download-artifact@v8
        with:
          name: bindings
          path: artifacts/bindings/
      - name: Package bindings
        run: cd artifacts && zip -r bindings.zip bindings/
      - name: Package WASM
        run: cd artifacts && zip -r wscd-manager-wasm.zip wasm-pkg/
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/siros_wscd_manager.xcframework.zip
            artifacts/siros_wscd_manager-*.aar
            artifacts/siros-wscd-manager-*.pom
            artifacts/bindings.zip
            artifacts/wscd-manager-wasm.zip
