name: Release — XCFramework + AAR

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Generate bindings on Linux (fast) ──────────────────────────────
  bindings:
    name: Generate bindings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: make bindings
      - uses: actions/upload-artifact@v4
        with:
          name: bindings
          path: bindings/

  # ── iOS / XCFramework (requires macOS) ─────────────────────────────
  ios:
    name: Build XCFramework
    runs-on: macos-latest
    needs: bindings
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios
      - uses: Swatinem/rust-cache@v2
      - uses: actions/download-artifact@v4
        with:
          name: bindings
          path: bindings/
      - run: make xcframework
      - name: Package XCFramework
        run: |
          cd target
          zip -r siros_wscd_manager.xcframework.zip siros_wscd_manager.xcframework
      - uses: actions/upload-artifact@v4
        with:
          name: xcframework
          path: target/siros_wscd_manager.xcframework.zip

  # ── Android / AAR (requires NDK) ──────────────────────────────────
  android:
    name: Build AAR
    runs-on: ubuntu-latest
    needs: bindings
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-ndk
        run: cargo install cargo-ndk
      - uses: android-actions/setup-android@v3
        with:
          api-level: 28
          ndk-version: "27.2.12479018"
      - uses: actions/download-artifact@v4
        with:
          name: bindings
          path: bindings/
      - run: make aar
      - uses: actions/upload-artifact@v4
        with:
          name: aar
          path: target/siros_wscd_manager-*.aar

  # ── Create GitHub Release ──────────────────────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [ios, android, bindings]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: xcframework
          path: artifacts/
      - uses: actions/download-artifact@v4
        with:
          name: aar
          path: artifacts/
      - uses: actions/download-artifact@v4
        with:
          name: bindings
          path: artifacts/bindings/
      - name: Package bindings
        run: cd artifacts && zip -r bindings.zip bindings/
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/siros_wscd_manager.xcframework.zip
            artifacts/siros_wscd_manager-*.aar
            artifacts/bindings.zip
